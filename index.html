<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <!-- SEO Meta Tags -->
  <title>Frontend Mentor | QR code component</title>
  <meta name="description"
    content="A clean, responsive QR code component challenge from Frontend Mentor, built with semantic HTML and modern CSS.">

  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

  <!-- Main Content Area -->
  <main id="main-content">

    <!-- Component card placeholder structure -->
    <article class="qr-card">
      <!-- QR code image or element will go here -->
      <img src="./assets/images/image-qr-code.png" alt="QR code linking to Frontend Mentor">
      <h1>Improve your front-end skills by building projects</h1>
      <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
    </article>

  </main>

  <!-- Footer / Attribution -->
  <footer class="attribution" role="contentinfo">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
      rel="noopener noreferrer">Frontend Mentor</a>.
    Coded by <a href="https://github.com/nara-md" target="_blank" rel="noopener noreferrer">Nara Mendes</a>.
  </footer>

</body>

</html>
